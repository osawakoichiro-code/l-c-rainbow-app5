```html
<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>キャリアライフレインボー 入力</title>

    <style>
        body {
            font-family: sans-serif;
            margin: 30px;
        }

        table {
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 6px;
            text-align: center;
            font-size: 14px;
        }

        th {
            background: #f2f2f2;
        }

        th:first-child {
            min-width: 180px;
            white-space: nowrap;
        }

        input {
            width: 60px;
            padding: 4px;
            text-align: right;
            font-size: 14px;
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {

            -webkit-appearance: none;
            appearance: none;
            margin: 0;

        }

        input[type=number] {

            -moz-appearance: textfield;
            appearance: textfield;

        }

        .btn {

            margin-top: 15px;
            padding: 10px 18px;
            font-size: 14px;
            cursor: pointer;

        }

        .note {

            margin-top: 10px;
            color: #555;

        }

        .error {

            margin-top: 10px;
            color: red;
            font-weight: bold;

        }

        .total-cell {

            background: #f9f9f9;
            font-weight: bold;

        }

        .sub {

            font-weight: normal;
            font-size: 12px;
            color: #555;

        }

        .spinBtn {

            width: 26px;
            height: 22px;
            font-size: 14px;
            cursor: pointer;
            margin: 0 2px;

        }

        .cellWrap {

            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2px;

        }
    </style>

</head>

<body>

    <h2>

        キャリアライフレインボー 入力（全年齢×全カテゴリ）

    </h2>


    <div class="note">

        各セルは0〜100（5刻み）で入力してください。<br>

        年齢ごとの合計は100を超えてもOKです。<br>

        保存時は各値÷年齢合計の割合（0〜1）でCloud Storageへ保存します。

    </div>


    <div id="tableArea"></div>


    <button class="btn" onclick="saveJSON()">

        Cloud Storageへ保存

    </button>


    <div id="msg" class="error"></div>


    <script>

        const all_ages = [

            10, 20, 30, 40, 50, 60, 70, 80

        ];

        const categories = [

            "子供",
            "学習する人",
            "余暇人",
            "市民",
            "労働者",
            "家庭人"

        ];


        let prevValues = {};



        function buildTable() {

            let html = "<table>";

            html += "<tr><th>カテゴリ\\年齢</th>";

            for (const age of all_ages) {

                html += `<th>${age}</th>`;

            }

            html += "</tr>";



            for (const cat of categories) {

                let label = cat;

                if (cat === "家庭人") {

                    label =

                        `家庭人

            <br>

            <span class="sub">

            (配偶者、親を含む)

            </span>`;

                }


                html += `<tr><th>${label}</th>`;


                for (const age of all_ages) {

                    const id = `${cat}_${age}`;


                    html += `

            <td>

                <div class="cellWrap">

                    <button

                    class="spinBtn"

                    onclick="stepValue('${id}',${age},-5)"

                    >

                    －

                    </button>


                    <input

                    type="number"

                    id="${id}"

                    min="0"

                    max="100"

                    step="5"

                    value="0"

                    onfocus="rememberValue('${id}')"

                    oninput="validateCell('${id}',${age})"

                    >


                    <button

                    class="spinBtn"

                    onclick="stepValue('${id}',${age},5)"

                    >

                    ＋

                    </button>

                </div>

            </td>

            `;

                }

                html += "</tr>";

            }



            html += "<tr><th>合計</th>";

            for (const age of all_ages) {

                html +=

                    `<td

        id="total_${age}"

        class="total-cell"

        >

        0

        </td>`;

            }

            html += "</tr>";

            html += "</table>";



            document.getElementById(

                "tableArea"

            ).innerHTML = html;


            updateAllTotals();

        }



        function rememberValue(id) {

            prevValues[id] =

                document.getElementById(id).value;

        }



        function getAgeTotal(age) {

            let total = 0;

            for (const cat of categories) {

                const id = `${cat}_${age}`;

                let v =

                    document.getElementById(id).value;

                if (v === "") v = "0";

                total += Number(v);

            }

            return total;

        }



        function updateTotal(age) {

            document.getElementById(

                `total_${age}`

            ).innerText =

                getAgeTotal(age);

        }



        function updateAllTotals() {

            for (const age of all_ages) {

                updateTotal(age);

            }

        }



        function validateCell(id, age) {

            document.getElementById(

                "msg"

            ).innerText = "";


            let v =

                document.getElementById(id).value;

            if (v === "") v = "0";

            const num = Number(v);


            if (

                !(

                    num >= 0

                    &&

                    num <= 100

                    &&

                    num % 5 === 0

                )

            ) {

                document.getElementById(

                    "msg"

                ).innerText =

                    "入力は0〜100の5刻みにしてください";


                document.getElementById(id).value =

                    prevValues[id] ?? 0;


                updateTotal(age);

                return;

            }


            prevValues[id] =

                document.getElementById(id).value;


            updateTotal(age);

        }



        function stepValue(id, age, step) {

            rememberValue(id);

            let v =

                document.getElementById(id).value;

            if (v === "") v = "0";

            let num = Number(v);

            num += step;

            if (num < 0) num = 0;

            if (num > 100) num = 100;

            document.getElementById(id).value = num;

            validateCell(id, age);

        }




        async function saveJSON() {


            for (const age of all_ages) {

                const total = getAgeTotal(age);

                if (total === 0) {

                    alert(

                        `${age}歳の合計が0です。`

                    );

                    return;

                }

            }


            let data_ratio = {};


            for (const cat of categories) {

                data_ratio[cat] = [];


                for (const age of all_ages) {

                    const id = `${cat}_${age}`;

                    let v =

                        document.getElementById(id).value;

                    if (v === "") v = "0";


                    const num = Number(v);

                    const total = getAgeTotal(age);


                    data_ratio[cat].push(

                        num / total

                    );

                }

            }



            const output = {

                all_ages,

                categories,

                data_ratio

            };



            try {


                const response = await fetch(

                    "/save",

                    {

                        method: "POST",

                        headers: {

                            "Content-Type":

                                "application/json"

                        },

                        body:

                            JSON.stringify(output)

                    }

                );


                const result =

                    await response.json();


                alert(

                    "保存成功\n\n"

                    +

                    JSON.stringify(

                        result,

                        null,

                        2

                    )

                );

            }

            catch (err) {

                console.error(err);

                alert("保存失敗");

            }

        }



        buildTable();

    </script>

</body>

</html>
```
